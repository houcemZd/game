app = "beergame"
primary_region = "cdg"

[build]
  dockerfile = "beer11C/Dockerfile"

[deploy]
  release_command = "python manage.py migrate --no-input"

[env]
  DJANGO_SETTINGS_MODULE = "beer_game.settings"
  DEBUG = "False"
  PORT = "8000"
  ALLOWED_HOSTS = ".fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://*.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health/"
  timeout = "5s"
