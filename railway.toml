[build]
buildCommand = "cd beer11C && pip install -r requirements.txt && python manage.py collectstatic --no-input"

[deploy]
startCommand = "cd beer11C && python manage.py migrate --no-input && daphne -b 0.0.0.0 -p $PORT beer_game.asgi:application"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
