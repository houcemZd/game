# Render.com blueprint — deploy the full Django + WebSocket Beer Game
# Docs: https://render.com/docs/blueprint-spec
#
# Quick start:
#   1. Fork / connect this repo to Render.com
#   2. In the Render dashboard click "New → Blueprint" and select this repo
#   3. Render auto-generates SECRET_KEY — no manual action needed
#   4. Click "Apply" — Render creates the web service + Redis automatically

services:
  - type: web
    name: beergame
    runtime: python
    rootDir: beer11C
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate --no-input
    startCommand: daphne -b 0.0.0.0 -p $PORT beer_game.asgi:application
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: beer_game.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true        # Render generates a secure random value
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: beergame
          property: host
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          type: web
          name: beergame
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: beergame-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: beergame-redis
          property: connectionString

  - type: redis
    name: beergame-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: beergame-db
    plan: free
