{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Beer Game{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'game/favicon.svg' %}">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Design tokens ────────────────────────────────────────────── */
    :root {
      --bg:        #0a0c11;
      --surface:   #13161f;
      --surface2:  #1a1e2a;
      --surface3:  #222738;
      --border:    #252b3b;
      --border-hover: #363e54;
      --text:      #eceef5;
      --muted:     #64748b;
      --muted2:    #4b5568;
      --accent:    #f5c842;
      --accent-dim: rgba(245,200,66,.15);
      --accent-glow: rgba(245,200,66,.3);
      --accent2:   #3b82f6;
      --danger:    #ef4444;
      --danger-dim: rgba(239,68,68,.12);
      --success:   #22c55e;
      --success-dim: rgba(34,197,94,.12);

      --retailer-color:     #f5c842;
      --wholesaler-color:   #3b82f6;
      --distributor-color:  #a855f7;
      --factory-color:      #22c55e;

      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;

      --nav-height: 58px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.35);
      --shadow-md: 0 8px 24px rgba(0,0,0,.45);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.55);
    }

    /* ── Custom scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animated grid background ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        /* Faint grid */
        linear-gradient(rgba(245,200,66,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,.022) 1px, transparent 1px),
        /* Subtle stars/dots */
        radial-gradient(circle 1px at 15% 25%, rgba(255,255,255,.06) 0%, transparent 100%),
        radial-gradient(circle 1px at 45% 65%, rgba(245,200,66,.05) 0%, transparent 100%),
        radial-gradient(circle 1px at 75% 15%, rgba(59,130,246,.04) 0%, transparent 100%),
        radial-gradient(circle 1px at 85% 75%, rgba(168,85,247,.04) 0%, transparent 100%),
        radial-gradient(circle 1px at 25% 85%, rgba(34,197,94,.04) 0%, transparent 100%),
        radial-gradient(circle 1px at 55% 35%, rgba(255,255,255,.04) 0%, transparent 100%);
      background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%;
      animation: grid-pan 32s linear infinite;
    }
    @keyframes grid-pan {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }
    /* Radial vignette */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 120% 60% at 20% 0%, rgba(245,200,66,.04) 0%, transparent 55%),
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 50%, rgba(10,12,17,.9) 100%);
    }
    nav, .container { position: relative; z-index: 1; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ─────────────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: var(--nav-height);
      background: rgba(13,16,23,.88);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(245,200,66,.06), 0 4px 24px rgba(0,0,0,.5);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent-glow);
      text-decoration: none;
      transition: opacity .2s;
    }
    .nav-logo:hover { opacity: .85; text-decoration: none; }
    .nav-logo-icon { font-size: 1.25rem; filter: drop-shadow(0 0 8px rgba(245,200,66,.6)); }
    .nav-links { display: flex; gap: 0.25rem; align-items: center; }
    .nav-links a {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); text-decoration: none; }
    .nav-links a.nav-cta {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(245,200,66,.25);
    }
    .nav-links a.nav-cta:hover { background: rgba(245,200,66,.22); color: var(--accent); }

    /* ── Layout ──────────────────────────────────────────────────── */
    .container { max-width: 1440px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      letter-spacing: .01em;
    }
    .btn:active { transform: scale(.97) !important; }
    .btn-primary {
      background: linear-gradient(135deg, #f5c842, #f0b830);
      color: #0a0c11;
      box-shadow: 0 2px 12px rgba(245,200,66,.35);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #fdd835, #f5c842);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,200,66,.45);
      text-decoration: none; color: #0a0c11;
    }
    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: translateX(-100%);
      transition: transform .45s ease;
    }
    .btn-primary:hover::after { transform: translateX(100%); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface2);
      text-decoration: none;
    }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(239,68,68,.4);
    }
    .btn-danger:hover { background: var(--danger-dim); border-color: var(--danger); text-decoration: none; }
    .btn-success {
      background: var(--success-dim);
      color: var(--success);
      border: 1px solid rgba(34,197,94,.35);
    }
    .btn-success:hover { background: rgba(34,197,94,.2); border-color: var(--success); text-decoration: none; }
    .btn-sm { padding: 0.32rem 0.75rem; font-size: 0.78rem; }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--border-hover); }
    .card-elevated {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
    }
    .card-glow {
      border-color: rgba(245,200,66,.3);
      box-shadow: 0 0 0 1px rgba(245,200,66,.1), 0 8px 32px rgba(245,200,66,.08);
    }
    .card-title {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Stat chips ──────────────────────────────────────────────── */
    .stat-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.65rem 1rem;
      min-width: 90px;
    }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-family: var(--font-mono); font-size: 1.35rem; font-weight: 700; margin-top: 3px; }
    .stat-value.good  { color: var(--success); }
    .stat-value.warn  { color: var(--accent); }
    .stat-value.bad   { color: var(--danger); }

    /* ── Role badge ──────────────────────────────────────────────── */
    .role-badge {
      display: inline-block;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: var(--font-mono);
    }
    .role-retailer     { background: rgba(245,200,66,.14);  color: var(--retailer-color);    border: 1px solid rgba(245,200,66,.25); }
    .role-wholesaler   { background: rgba(59,130,246,.14);  color: var(--wholesaler-color);  border: 1px solid rgba(59,130,246,.25); }
    .role-distributor  { background: rgba(168,85,247,.14);  color: var(--distributor-color); border: 1px solid rgba(168,85,247,.25); }
    .role-factory      { background: rgba(34,197,94,.14);   color: var(--factory-color);     border: 1px solid rgba(34,197,94,.25); }
    .role-customer     { background: rgba(245,200,66,.1);   color: #ffd36a;                  border: 1px solid rgba(245,200,66,.2); }

    /* ── Input ───────────────────────────────────────────────────── */
    input[type=number], input[type=text], input[type=email], input[type=password], select, textarea {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.55rem 0.85rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      -webkit-appearance: none;
    }
    input[type=number]:focus, input[type=text]:focus,
    input[type=email]:focus, input[type=password]:focus,
    select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    input::placeholder { color: var(--muted2); }

    /* ── Pipeline viz ────────────────────────────────────────────── */
    .pipeline {
      display: flex; align-items: center; gap: 0;
      overflow-x: auto; padding: 1rem 0;
    }
    .pipeline-node { flex: 1; text-align: center; min-width: 120px; }
    .pipeline-node-box {
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem; margin: 0 0.5rem; position: relative;
    }
    .pipeline-node-box.retailer    { border-color: var(--retailer-color); }
    .pipeline-node-box.wholesaler  { border-color: var(--wholesaler-color); }
    .pipeline-node-box.distributor { border-color: var(--distributor-color); }
    .pipeline-node-box.factory     { border-color: var(--factory-color); }
    .pipeline-arrow { color: var(--muted); font-size: 1.2rem; flex-shrink: 0; }
    .pipeline-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }

    /* ── Flash messages ──────────────────────────────────────────── */
    .messages { list-style: none; margin-bottom: 1.25rem; }
    .messages li {
      display: flex; align-items: center; gap: .6rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      border-left: 3px solid transparent;
    }
    .messages .success {
      background: var(--success-dim);
      border: 1px solid rgba(34,197,94,.25);
      border-left-color: var(--success);
      color: #4ade80;
    }
    .messages .error {
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,.25);
      border-left-color: var(--danger);
      color: #fca5a5;
    }

    /* ── Utilities ───────────────────────────────────────────────── */
    .text-mono   { font-family: var(--font-mono); }
    .text-muted  { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-success { color: var(--success); }
    .text-danger  { color: var(--danger); }
    .glow-accent  { text-shadow: 0 0 22px var(--accent-glow); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
      nav { padding: 0 1rem; }
      .container { padding: 1.25rem 1rem; }
    }

    /* ── Progress bar ────────────────────────────────────────────── */
    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
      margin: 0.5rem 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #fdd835);
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(200%); } }

    /* ── Week badge ──────────────────────────────────────────────── */
    .week-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
    }
    .week-badge strong { color: var(--accent); }

    /* ── Section divider ─────────────────────────────────────────── */
    .section-label {
      font-family: var(--font-mono);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .85rem;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Fade-in animation ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .35s ease both; }
    .fade-up-delay { animation: fadeUp .35s ease .1s both; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{% url 'home' %}" class="nav-logo">
      <span class="nav-logo-icon"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Mug body -->
        <rect x="4" y="8" width="18" height="19" rx="3" fill="#f5c842" opacity="0.9"/>
        <!-- Foam at top -->
        <ellipse cx="13" cy="8" rx="9" ry="3.5" fill="#fff" opacity="0.85"/>
        <ellipse cx="9" cy="6.8" rx="3.5" ry="3" fill="#fff" opacity="0.8"/>
        <ellipse cx="15" cy="6" rx="3" ry="2.8" fill="#fff" opacity="0.75"/>
        <ellipse cx="20" cy="7" rx="2.5" ry="2.2" fill="#fff" opacity="0.72"/>
        <!-- Handle -->
        <path d="M22 12 Q29 12 29 18 Q29 24 22 24" stroke="#f5c842" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
        <!-- Beer color fill (darker amber centre) -->
        <rect x="5" y="10" width="16" height="16" rx="2" fill="#e8a820" opacity="0.55"/>
        <!-- Bubbles -->
        <circle cx="10" cy="18" r="1.2" fill="#fff" opacity="0.25"/>
        <circle cx="14" cy="22" r="0.8" fill="#fff" opacity="0.2"/>
        <circle cx="17" cy="16" r="1" fill="#fff" opacity="0.22"/>
      </svg></span>
      BEER<span>/</span>GAME
    </a>
    <div class="nav-links">
      <a href="{% url 'home' %}">Sessions</a>
      <a href="{% url 'new_game' %}" class="nav-cta">+ New Game</a>
    </div>
  </nav>

  <div class="container">
    {% if messages %}
      <ul class="messages fade-up">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
